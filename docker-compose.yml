services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spend-track-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - laravel
    ports:
      - "5173:5173"
    depends_on:
      app:
        condition: service_started

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spend-track
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - /var/www/vendor
    networks:
      - laravel
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: spend-track-db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: spend_track
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel
    ports:
      - "5433:5432"

networks:
  laravel:
    driver: bridge

volumes:
  postgres_data:
